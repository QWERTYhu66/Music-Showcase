<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Music Showcase</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="member.css">
        <link rel="icon" href="images/logo.png" type="image/x-icon">
        <script src="config.js"></script>
        <script>
            // Safe fallback if config.js fails to load.
            const MS_API_BASE = (((window.MS_API_BASE && String(window.MS_API_BASE)) || 'https://music-showcase-server.onrender.com')).replace(/\/+$/, '');
            document.addEventListener('DOMContentLoaded', () => {
                fetch(`${MS_API_BASE}/check-session`, {
                    credentials: 'include'
                })
                .then(res => res.ok ? res.json() : { loggedIn: false })
                .then(data => {
                    if (!data.loggedIn) {
                        window.location.href = './login.html';
                        return;
                    }
                    const target = document.getElementById('member-username');
                    if (target && data.username) {
                        target.textContent = data.username;
                    }
                })
                .catch(() => {
                    window.location.href = './login.html';
                });
            });
        </script>
    </head>
    <body>
        <div id="topbar-placeholder"></div>
        <div class="content">
            <h1>Member Page</h1>
            <p>Welcome to the member page, <span id="member-username"></span>!</p>
        </div>
        <script src="index.js"></script>
        <script src="member.js"></script>
    </body>
</html>
